<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LireMonde | Accueil</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">LireMonde</div>
            <div class="search-container">
                <input type="text" id="global-search" placeholder="Rechercher un livre ou un auteur...">
            </div>
            <ul class="nav-links">
                <li><a href="accueil.html" class="active">Accueil</a></li>
                <li><a href="alire.html">À lire</a></li>
                <li><a href="admine.html">Admin</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="toolbar">
            <h2>Notre Collection de Livres</h2>
            <div class="filter-group">
                <label for="genre-filter">Filtrer par genre :</label>
                <select id="genre-filter">
                    <option value="all">Tous les genres</option>
                    <!-- Rempli dynamiquement -->
                </select>
            </div>
        </div>

        <!-- Grille d'affichage dynamique (User Story 1) -->
        <div id="books-grid-container" class="books-grid"></div>
    </main>

    <!-- Modale de Détails (User Story 2) -->
    <div id="book-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="close-modal-btn">&times;</span>
            <div class="modal-left">
                <img id="modal-cover" src="" alt="Couverture du livre" style="width: 100%; border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">
            </div>
            <div class="modal-right">
                <div>
                    <h2 id="modal-title"></h2>
                    <h4 id="modal-author" style="color: #7f8c8d; margin-bottom: 1rem;"></h4>
                    <p style="margin-bottom: 0.5rem;"><strong>Genre :</strong> <span id="modal-genre" class="book-genre"></span></p>
                    <p id="modal-description" style="margin-top: 1rem; color: #555; text-align: justify;"></p>
                </div>
                <button id="modal-toggle-alire-btn" class="btn-toggle-alire">Ajouter à la liste "À lire"</button>
            </div>
        </div>
    </div>

    <footer>
        <p>Plateforme LireMonde par ReadSphere © 2026 - Culture numérique interactive</p>
    </footer>

    <script src="accueil.js"></script>
</body>
</html>
